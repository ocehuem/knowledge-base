<div class="sidebar">
  <h3>Courses</h3>

  {% for course in site.data.courses %}
    <div class="course">

      <div class="course-header" onclick="toggle(this)">
        ➕ {{ course[1].name }}
      </div>

      <div class="course-content">
        {% for lesson in course[1].lessons %}
          <a href="{{ lesson.url | relative_url }}">
            {{ lesson.title }}
          </a>
        {% endfor %}
      </div>

    </div>
  {% endfor %}
</div>
