<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title }}</title>
  <style>
    body { display: flex; font-family: Arial; }
    .sidebar { width: 260px; background: #f4f4f4; padding: 10px; }
    .content { padding: 20px; flex: 1; }
    a { display: block; text-decoration: none; margin: 4px 0; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Courses</h3>

  {% assign grouped = site.courses | group_by: "course" %}

  {% for group in grouped %}
    {% assign courseData = site.data.courses[group.name] %}

    <div onclick="toggle('{{ group.name }}')" style="cursor:pointer;">
      ➕ {{ courseData.name }}
    </div>

    <div id="{{ group.name }}" style="display:none; margin-left:10px;">
      {% assign pages = group.items | sort: "order" %}
      {% for p in pages %}
        <a href="{{ p.url }}">{{ p.title }}</a>
      {% endfor %}
    </div>
  {% endfor %}
</div>

<div class="content">
  {{ content }}
</div>

<script>
function toggle(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
